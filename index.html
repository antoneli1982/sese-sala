<script>
(function(){
'use strict';
const VERSION='v2026-05-19-sync-final-100';
const FB={apiKey:'AIzaSyCbl4nFuHOq6Emw9a68JyaREPNpDdjrz4k',databaseURL:'https://sala-conecta-default-rtdb.firebaseio.com',projectId:'sala-conecta',rid:'sala-1'};
const DEFAULT_ROOM={name:'Sala Conecta',cap:12,floor:'1º Andar',resp:'Responsável',desc:'',manualStatus:null,updatedAt:0};
let room={...DEFAULT_ROOM};
let meetings=[];
let db=null, sdkReady=false, sdkListeners=false, editingKey=null, lastSync='nunca', polling=null, isSaving=false;
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const pad=n=>String(n).padStart(2,'0');
function today(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function nowM(){const d=new Date();return d.getHours()*60+d.getMinutes();}
function toM(t){if(!/^\d{2}:\d{2}$/.test(String(t||'')))return NaN;const [h,m]=t.split(':').map(Number);return h*60+m;}
function duration(s,e){const a=toM(s),b=toM(e),d=b-a;if(!isFinite(d)||d<=0)return'';const h=Math.floor(d/60),m=d%60;return h&&m?`${h}h${m}min`:h?`${h}h`:`${m}min`;}
function fmtDate(iso){const d=new Date(iso+'T00:00:00');if(iso===today())return'Hoje';const t=new Date();t.setDate(t.getDate()+1);const tm=t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate());if(iso===tm)return'Amanhã';return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).replace(/\./g,'').replace(/^\w/,c=>c.toUpperCase());}
function fmtLong(iso){return new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function meetingState(m){const t=today(),nm=nowM();if(m.status==='cancelled')return'cancelled';const s=toM(m.start),e=toM(m.end);if(!m.date||!isFinite(s)||!isFinite(e))return'invalid';if(m.date<t||(m.date===t&&e<=nm))return'done';if(m.date===t&&nm>=s&&nm<e)return'now';if(m.date===t&&nm>=s-15&&nm<s)return'soon';return'scheduled';}
function normalizeMeetings(obj){const list=[];if(obj&&typeof obj==='object'){Object.keys(obj).forEach(k=>{const v=obj[k]||{};if(v&&typeof v==='object'){list.push({_k:k,title:String(v.title||''),date:String(v.date||''),start:String(v.start||''),end:String(v.end||''),resp:String(v.resp||''),participants:String(v.participants||''),notes:String(v.notes||''),status:String(v.status||'scheduled')});}})}list.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||toM(a.start)-toM(b.start)||String(a.title).localeCompare(String(b.title)));return list;}

function restUrl(path){return FB.databaseURL.replace(/\/$/,'')+'/'+path.split('/').map(encodeURIComponent).join('/')+'.json?ts='+Date.now();}
async function restGet(path){const r=await fetch(restUrl(path),{method:'GET',cache:'no-store',headers:{'Accept':'application/json'}});if(!r.ok)throw new Error('GET '+path+' HTTP '+r.status+' '+await r.text());return await r.json();}

async function restPost(path,data){const r=await fetch(restUrl(path),{method:'POST',cache:'no-store',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!r.ok)throw new Error('POST '+path+' HTTP '+r.status+' '+await r.text());return await r.json();}
async function restDelete(path){const r=await fetch(restUrl(path),{method:'DELETE',cache:'no-store'});if(!r.ok)throw new Error('DELETE '+path+' HTTP '+r.status+' '+await r.text());return await r.json();}
async function fetchAll(silent=false){const btn=$('btnRefresh');if(btn)btn.classList.add('spinning');try{const [r,m]=await Promise.all([restGet(FB.rid+'/room'),restGet(FB.rid+'/meetings')]);if(r&&typeof r==='object')room={...DEFAULT_ROOM,...r};else await restPut(FB.rid+'/room',room);meetings=normalizeMeetings(m);lastSync=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});setConn('ok','Firebase '+FB.rid+' · '+meetings.length+' reunião(ões)');renderAll();if(!silent)toast('Atualizado do Firebase','ok');return true;}catch(e){console.error(e);setConn('err','Erro Firebase: '+e.message);if(!silent)toast('Erro ao ler Firebase: '+e.message,'err');return false;}finally{if(btn)btn.classList.remove('spinning');}}
function initSdk(){setTimeout(()=>{try{if(!window.firebase)return;try{firebase.app();}catch(_){firebase.initializeApp({apiKey:FB.apiKey,databaseURL:FB.databaseURL,projectId:FB.projectId});}db=firebase.database();sdkReady=true;startSdkListeners();}catch(e){console.warn('SDK indisponível, usando REST',e);}},700);}
function startSdkListeners(){if(!db||sdkListeners)return;sdkListeners=true;try{db.ref(FB.rid+'/room').on('value',snap=>{const val=snap.val();if(val&&typeof val==='object'){room={...DEFAULT_ROOM,...val};renderAll();}},err=>{console.warn('SDK room',err);});db.ref(FB.rid+'/meetings').on('value',snap=>{meetings=normalizeMeetings(snap.val());lastSync=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});setConn('ok','Tempo real '+FB.rid+' · '+meetings.length+' reunião(ões)');renderAll();},err=>{console.warn('SDK meetings',err);});db.ref('.info/connected').on('value',snap=>{if(snap.val()===true)setConn('ok','Tempo real conectado · '+meetings.length+' reunião(ões)');});}catch(e){console.warn('listeners falharam',e);}}
function effectiveStatus(){if(room.manualStatus)return{status:room.manualStatus,meeting:null};const t=today(),nm=nowM();const active=meetings.filter(m=>m.status==='scheduled'&&m.date===t);for(const m of active){if(nm>=toM(m.start)&&nm<toM(m.end))return{status:'busy',meeting:m};}for(const m of active){if(nm>=toM(m.start)-15&&nm<toM(m.start))return{status:'reserved',meeting:m};}return{status:'free',meeting:null};}
function nextMeeting(){const t=today(),nm=nowM();return meetings.filter(m=>m.status==='scheduled'&&(m.date>t||(m.date===t&&toM(m.start)>nm))).sort((a,b)=>a.date.localeCompare(b.date)||toM(a.start)-toM(b.start))[0]||null;}
function renderStatus(){const eff=effectiveStatus();const map={free:['Disponível','ok'],busy:['Ocupada','busy'],reserved:['Reservada','reserved']};$('roomName').textContent=room.name||'Sala Conecta';$('roomFloor').textContent=room.floor||'1º Andar';$('roomCap').textContent=(Number(room.cap)||0)+' pessoa'+(Number(room.cap)===1?'':'s');$('roomResp').textContent=room.resp||'Responsável';$('statusPill').textContent=map[eff.status][0];$('statusPill').className='pill '+map[eff.status][1];$('statusCard').className='card statusCard '+(eff.status==='busy'?'busy':eff.status==='reserved'?'reserved':'');$('qFree').classList.toggle('on',room.manualStatus==='free');$('qBusy').classList.toggle('on',room.manualStatus==='busy');$('qReserved').classList.toggle('on',room.manualStatus==='reserved');const nb=$('nowBox'), nx=$('nextBox');if(eff.meeting){const m=eff.meeting;nb.innerHTML=`<div class="infoBox"><div class="label">${eff.status==='busy'?'Em andamento':'Começa em '+(toM(m.start)-nowM())+' min'}</div><div class="infoTitle">${esc(m.title)}</div><div class="small">${esc(m.start)} - ${esc(m.end)} (${duration(m.start,m.end)}) ${m.resp?'· '+esc(m.resp):''}</div></div>`;}else nb.innerHTML='';const n=nextMeeting();if(n&&(!eff.meeting||n._k!==eff.meeting._k))nx.innerHTML=`<div class="infoBox"><div class="label">Próxima · ${fmtDate(n.date)}</div><div class="infoTitle">${esc(n.title)}</div><div class="small">${esc(n.start)} - ${esc(n.end)} (${duration(n.start,n.end)}) ${n.resp?'· '+esc(n.resp):''}</div></div>`;else if(!n)nx.innerHTML='<div class="infoBox"><div class="label">Próximas reuniões</div><div class="small">Nenhuma reunião agendada.</div></div>';else nx.innerHTML='';}
function weekDates(){const d=new Date(),day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);const arr=[];for(let i=0;i<7;i++){const x=new Date(mon);x.setDate(mon.getDate()+i);arr.push(x.getFullYear()+'-'+pad(x.getMonth()+1)+'-'+pad(x.getDate()));}return arr;}
function renderWeek(){const ds=weekDates(),names=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];$('weekStrip').innerHTML=ds.map((d,i)=>{const cnt=meetings.filter(m=>m.date===d&&m.status!=='cancelled').length;return`<div class="wday ${d===today()?'today':''}" data-date="${d}"><span>${names[i]}</span><b>${Number(d.slice(8))}</b>${cnt?`<em class="cnt">${cnt}</em>`:'<em style="display:block;height:20px"></em>'}</div>`;}).join('');document.querySelectorAll('.wday').forEach(el=>el.addEventListener('click',()=>openModal(null,el.dataset.date)));}
function renderAgenda(){const activeCount=meetings.filter(m=>m.status!=='cancelled').length;$('agendaCount').textContent=activeCount+' reunião'+(activeCount===1?'':'ões')+' · última sync '+lastSync;renderWeek();const group={};for(const m of meetings){if(!group[m.date])group[m.date]=[];group[m.date].push(m);}const ds=[...new Set([...weekDates(),...Object.keys(group)])].sort();if(!meetings.length){$('agendaList').innerHTML='<div class="empty">Nenhuma reunião no Firebase.<br>Toque em <b>Agendar</b> para criar a primeira.</div>';return;}$('agendaList').innerHTML=ds.map(d=>{const list=group[d]||[];return`<div class="day" id="day-${d}"><div class="dayHead">${fmtDate(d)} - ${fmtLong(d)} ${list.length?'('+list.filter(x=>x.status!=='cancelled').length+')':''}</div>${list.length?list.map(meetingHtml).join(''):'<div class="small" style="padding:0 4px 10px">Sem reuniões.</div>'}</div>`;}).join('');document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openModal(b.dataset.edit)));document.querySelectorAll('[data-cancel]').forEach(b=>b.addEventListener('click',()=>cancelMeeting(b.dataset.cancel)));document.querySelectorAll('[data-delete]').forEach(b=>b.addEventListener('click',()=>deleteMeeting(b.dataset.delete)));}
function meetingHtml(m){const st=meetingState(m);const badge={now:'Em andamento',soon:'Em breve',scheduled:'Agendada',done:'Concluída',cancelled:'Cancelada',invalid:'Inválida'}[st]||'Agendada';const can=['scheduled','soon','now'].includes(st)&&m.status==='scheduled';return`<div class="meeting ${st}"><div class="bar"></div><div style="flex:1;min-width:0"><div class="mbody"><div class="mtime">${esc(m.start)} - ${esc(m.end)} ${duration(m.start,m.end)?'· '+duration(m.start,m.end):''}</div><div class="mtitle">${esc(m.title||'Sem título')}</div>${m.resp||m.participants?`<div class="mwho">${esc(m.resp)}${m.resp&&m.participants?' · ':''}${esc(m.participants)}</div>`:''}${m.notes?`<div class="mnotes">${esc(m.notes)}</div>`:''}<span class="badge ${st}">${badge}</span></div><div class="actions">${can?`<button class="editBtn" data-edit="${esc(m._k)}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>Editar</button><button class="cancelBtn" data-cancel="${esc(m._k)}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Cancelar</button>`:''}${m.status==='cancelled'?`<button class="cancelBtn" data-delete="${esc(m._k)}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>Excluir</button>`:''}</div></div></div>`;}
function renderEdit(){$('editName').value=room.name||'';$('editCap').value=room.cap||12;$('editFloor').value=room.floor||'1º Andar';$('editResp').value=room.resp||'';$('editDesc').value=room.desc||'';$('editDebug').textContent=`Firebase: ${FB.databaseURL}\nCaminho: ${FB.rid}\nVersão: ${VERSION}\nÚltima sincronização: ${lastSync}\nReuniões carregadas: ${meetings.length}`;}
function renderClock(){const d=new Date();$('clockLine').textContent=pad(d.getHours())+':'+pad(d.getMinutes());$('dateLine').textContent=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());}
function updateDebug(){const sample=meetings[0]?`${meetings[0].title} · ${meetings[0].date} ${meetings[0].start}-${meetings[0].end}`:'nenhuma';$('debugBox').textContent=`Diagnóstico\nFirebase: ${FB.databaseURL}\nSala/caminho: ${FB.rid}\nVersão visível: ${VERSION}\nSDK: ${sdkReady?'carregado':'REST/fallback'}\nListeners: ${sdkListeners?'ativos':'aguardando'}\nÚltima sincronização: ${lastSync}\nReuniões em tela: ${meetings.length}\nPrimeira reunião: ${sample}\nURL: ${location.href}`;}
function renderAll(){renderStatus();renderAgenda();renderEdit();updateDebug();}
function openModal(key=null,preDate=null){editingKey=key;const m=key?meetings.find(x=>x._k===key):null;$('modalTitle').textContent=m?'Editar reunião':'Nova reunião';$('mTitle').value=m?.title||'';$('mDate').value=m?.date||preDate||today();$('mStart').value=m?.start||'';$('mEnd').value=m?.end||'';$('mResp').value=m?.resp||'';$('mParticipants').value=m?.participants||'';$('mNotes').value=m?.notes||'';$('meetModal').classList.add('open');setTimeout(()=>$('mTitle').focus(),80);}
function closeModal(){$('meetModal').classList.remove('open');editingKey=null;isSaving=false;$('btnSaveMeet').disabled=false;$('btnSaveMeet').textContent='Salvar e sincronizar';}
function collectMeeting(){const title=$('mTitle').value.trim(),date=$('mDate').value,start=$('mStart').value,end=$('mEnd').value;if(!title)throw new Error('Informe o título.');if(!date)throw new Error('Informe a data.');if(!start||!end)throw new Error('Informe início e término.');if(toM(end)<=toM(start))throw new Error('O término deve ser após o início.');const conflict=meetings.find(m=>m._k!==editingKey&&m.status==='scheduled'&&m.date===date&&toM(start)<toM(m.end)&&toM(end)>toM(m.start));if(conflict)throw new Error('Conflito com "'+conflict.title+'" '+conflict.start+'-'+conflict.end+'.');return{title,date,start,end,resp:$('mResp').value.trim(),participants:$('mParticipants').value.trim(),notes:$('mNotes').value.trim(),status:'scheduled',updatedAt:Date.now()};}
async function saveMeeting(){if(isSaving)return;try{isSaving=true;$('btnSaveMeet').disabled=true;$('btnSaveMeet').textContent='Sincronizando...';const data=collectMeeting();if(editingKey){await restPatch(FB.rid+'/meetings/'+editingKey,data);toast('Reunião atualizada no Firebase','ok');}else{const localKey='tmp-'+Date.now();meetings.push({_k:localKey,...data});renderAll();await restPost(FB.rid+'/meetings',data);toast('Reunião sincronizada no Firebase','ok');}closeModal();await fetchAll(true);}catch(e){console.error(e);toast(e.message,'err');isSaving=false;$('btnSaveMeet').disabled=false;$('btnSaveMeet').textContent='Salvar e sincronizar';}}
async function cancelMeeting(key){const m=meetings.find(x=>x._k===key);if(!m)return;if(!confirm('Cancelar "'+m.title+'"?'))return;try{await restPatch(FB.rid+'/meetings/'+key,{status:'cancelled',updatedAt:Date.now()});toast('Reunião cancelada','info');await fetchAll(true);}catch(e){toast('Erro ao cancelar: '+e.message,'err');}}
async function deleteMeeting(key){const m=meetings.find(x=>x._k===key);if(!m)return;if(!confirm('Excluir permanentemente "'+m.title+'"?'))return;try{await restDelete(FB.rid+'/meetings/'+key);toast('Reunião excluída','ok');await fetchAll(true);}catch(e){toast('Erro ao excluir: '+e.message,'err');}}
async function saveRoom(){try{room={...room,name:$('editName').value.trim()||'Sala Conecta',cap:Number($('editCap').value)||12,floor:$('editFloor').value,resp:$('editResp').value.trim(),desc:$('editDesc').value.trim(),updatedAt:Date.now()};await restPut(FB.rid+'/room',room);toast('Sala salva no Firebase','ok');await fetchAll(true);}catch(e){toast('Erro ao salvar sala: '+e.message,'err');}}
async function setStatus(status){try{const next=room.manualStatus===status?null:status;await restPatch(FB.rid+'/room',{manualStatus:next,updatedAt:Date.now()});room.manualStatus=next;renderAll();toast(next?'Status manual salvo':'Status automático ativado','info');}catch(e){toast('Erro ao salvar status: '+e.message,'err');}}
function showTab(name){document.querySelectorAll('.tabbtn').forEach(b=>b.classList.toggle('on',b.dataset.tab===name));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.id==='tab-'+name));if(name==='edit')renderEdit();}
function clearLocal(){try{localStorage.removeItem('sese_meetings');localStorage.removeItem('sese_r');localStorage.removeItem('sese_fb');sessionStorage.clear();toast('Cache local limpo neste aparelho','ok');}catch(e){toast('Não consegui limpar cache: '+e.message,'err');}}
function bind(){document.querySelectorAll('.tabbtn').forEach(b=>b.addEventListener('click',()=>showTab(b.dataset.tab)));$('btnRefresh').addEventListener('click',()=>fetchAll(false));$('btnAddTop').addEventListener('click',()=>openModal());$('btnFab').addEventListener('click',()=>openModal());$('btnCloseModal').addEventListener('click',closeModal);$('btnCancelModal').addEventListener('click',closeModal);$('meetModal').addEventListener('click',e=>{if(e.target===$('meetModal'))closeModal();});$('btnSaveMeet').addEventListener('click',saveMeeting);$('btnSaveRoom').addEventListener('click',saveRoom);$('btnClearLocal').addEventListener('click',clearLocal);$('qFree').addEventListener('click',()=>setStatus('free'));$('qBusy').addEventListener('click',()=>setStatus('busy'));$('qReserved').addEventListener('click',()=>setStatus('reserved'));document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')fetchAll(true);});window.addEventListener('online',()=>fetchAll(false));}
async function boot(){window.SALA_CONECTA_DEBUG={FB,VERSION,fetchAll,meetings:()=>meetings,room:()=>room,openModal};$('versionText').textContent=VERSION;bind();renderClock();setInterval(renderClock,1000);setInterval(renderStatus,30000);setConn('wait','Carregando Firebase '+FB.rid+'...');renderAll();initSdk();await fetchAll(true);polling=setInterval(()=>fetchAll(true),5000);}
window.addEventListener('error',e=>{console.error(e.error||e.message);try{toast('Erro JS: '+(e.message||'falha desconhecida'),'err');setConn('err','Erro JS: '+(e.message||'falha'));}catch(_){}});
window.addEventListener('unhandledrejection',e=>{console.error(e.reason);try{toast('Erro: '+(e.reason?.message||e.reason||'falha desconhecida'),'err');}catch(_){}});
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>
